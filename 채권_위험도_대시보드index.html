<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Noto Sans KR', sans-serif; background: #f5f4f0; color: #1a1a18; font-size: 14px; }
.header { background: #fff; border-bottom: 0.5px solid #e0dfd8; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 18px; font-weight: 500; }
.header .date { font-size: 12px; color: #888780; }
.dash { padding: 20px 24px; max-width: 1200px; margin: 0 auto; }
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.kpi { background: #fff; border-radius: 10px; padding: 16px 18px; border: 0.5px solid #e0dfd8; }
.kpi-label { font-size: 12px; color: #888780; margin-bottom: 8px; }
.kpi-value { font-size: 24px; font-weight: 500; }
.kpi-sub { font-size: 11px; color: #b4b2a9; margin-top: 4px; }
.kpi.danger .kpi-value { color: #A32D2D; }
.kpi.warn .kpi-value { color: #854F0B; }
.kpi.blue .kpi-value { color: #185FA5; }
.risk-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
.pill { display: flex; align-items: center; gap: 7px; padding: 7px 16px; border-radius: 999px; font-size: 13px; font-weight: 500; border: 1px solid; }
.pill-위험 { background: #FCEBEB; color: #A32D2D; border-color: #F09595; }
.pill-경고 { background: #FAEEDA; color: #854F0B; border-color: #FAC775; }
.pill-주의 { background: #E6F1FB; color: #185FA5; border-color: #85B7EB; }
.pill-정상 { background: #EAF3DE; color: #3B6D11; border-color: #97C459; }
.pill-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.pill-위험 .pill-dot { background: #A32D2D; }
.pill-경고 .pill-dot { background: #854F0B; }
.pill-주의 .pill-dot { background: #185FA5; }
.pill-정상 .pill-dot { background: #3B6D11; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.card { background: #fff; border-radius: 12px; padding: 18px 20px; border: 0.5px solid #e0dfd8; }
.card-title { font-size: 13px; font-weight: 500; color: #5f5e5a; margin-bottom: 16px; }
.filter-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.filter-bar input, .filter-bar select { font-size: 13px; padding: 6px 10px; border-radius: 8px; border: 0.5px solid #d3d1c7; background: #fff; color: #1a1a18; outline: none; }
.filter-bar input { flex: 1; min-width: 140px; }
.table-wrap { overflow: auto; max-height: 400px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
thead th { position: sticky; top: 0; background: #f5f4f0; padding: 8px 10px; text-align: left; font-weight: 500; font-size: 12px; color: #5f5e5a; border-bottom: 0.5px solid #e0dfd8; white-space: nowrap; }
tbody td { padding: 9px 10px; border-bottom: 0.5px solid #f1efe8; vertical-align: middle; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
tbody tr:hover { background: #f9f8f4; }
.badge { display: inline-block; padding: 2px 9px; border-radius: 999px; font-size: 11px; font-weight: 500; }
.b-위험 { background: #FCEBEB; color: #A32D2D; }
.b-경고 { background: #FAEEDA; color: #854F0B; }
.b-주의 { background: #E6F1FB; color: #185FA5; }
.b-정상 { background: #EAF3DE; color: #3B6D11; }
.b-해당없음 { background: #f1efe8; color: #888780; }
.num-r { text-align: right; font-variant-numeric: tabular-nums; }
.red { color: #A32D2D; }
.muted { color: #b4b2a9; }
.sp-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.sp-name { font-size: 13px; font-weight: 500; min-width: 48px; }
.sp-bg { flex: 1; height: 8px; background: #e0dfd8; border-radius: 4px; overflow: hidden; }
.sp-fill { height: 100%; border-radius: 4px; }
.sp-val { font-size: 12px; color: #5f5e5a; min-width: 70px; text-align: right; }
.sp-exc { font-size: 12px; color: #A32D2D; min-width: 70px; text-align: right; }
.legend-row { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #888780; margin-bottom: 5px; }
.leg-sq { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
@media (max-width: 700px) {
  .kpi-grid { grid-template-columns: 1fr 1fr; }
  .two-col { grid-template-columns: 1fr; }
}
</style>

function fmt(n) {
  const a = Math.abs(n);
  const sign = n < 0 ? '-' : '';
  if (a >= 1e8) return sign + '₩' + (Math.round(a/1e7)/10).toFixed(1) + '억';
  if (a >= 1e6) return sign + '₩' + Math.round(a/1e6) + '백만';
  return sign + '₩' + Math.round(a).toLocaleString('ko-KR');
}

const s = DATA.summary;
document.getElementById('k-recv').textContent = fmt(s.total_receivable);
document.getElementById('k-coll').textContent = fmt(s.total_collateral);
document.getElementById('k-excess').textContent = fmt(s.total_excess);
const exCnt = DATA.stores.filter(x => x.excess > 0).length;
document.getElementById('k-excess-cnt').textContent = exCnt + '개 매장 담보 초과';
document.getElementById('k-hi').textContent = (s.risk_counts['위험']||0) + (s.risk_counts['경고']||0) + '개';

const pillsEl = document.getElementById('riskPills');
[['위험','위험'],['경고','경고'],['주의','주의'],['정상','정상']].forEach(([r, label]) => {
  const cnt = s.risk_counts[r] || 0;
  const p = document.createElement('div');
  p.className = 'pill pill-' + r;
  p.innerHTML = `<span class="pill-dot"></span>${label} ${cnt}개`;
  pillsEl.appendChild(p);
});

const topStores = DATA.stores.filter(x => x.excess > 0).sort((a,b) => b.excess - a.excess).slice(0,10);
const riskColors = { '위험': '#E24B4A', '경고': '#EF9F27', '주의': '#378ADD', '정상': '#639922' };

new Chart(document.getElementById('topChart'), {
  type: 'bar',
  data: {
    labels: topStores.map(s => s.name.length > 10 ? s.name.slice(0,10)+'…' : s.name),
    datasets: [{
      data: topStores.map(s => Math.round(s.excess/1e6)),
      backgroundColor: topStores.map(s => riskColors[s.risk] || '#378ADD'),
      borderRadius: 4, borderSkipped: false
    }]
  },
  options: {
    indexAxis: 'y', responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => '₩' + Math.round(c.raw) + '백만' } } },
    scales: {
      x: { ticks: { callback: v => v+'M', font: { size: 11 } }, grid: { color: 'rgba(0,0,0,0.06)' } },
      y: { ticks: { font: { size: 11 } } }
    }
  }
});

const spEl = document.getElementById('spBars');
const sp = DATA.by_salesperson;
const maxR = Math.max(...Object.values(sp).map(d => d.receivable));
const spColors = { '김연준':'#378ADD','김종윤':'#1D9E75','손효동':'#D85A30','왕준하':'#534AB7','전재영':'#D4537E','최낙호':'#639922' };
Object.entries(sp).sort((a,b) => b[1].receivable - a[1].receivable).forEach(([name, d]) => {
  const pct = Math.round(d.receivable/maxR*100);
  const color = spColors[name] || '#378ADD';
  const row = document.createElement('div');
  row.className = 'sp-row';
  row.innerHTML = `<span class="sp-name">${name}</span><div class="sp-bg"><div class="sp-fill" style="width:${pct}%;background:${color};"></div></div><span class="sp-val">${fmt(d.receivable)}</span><span class="sp-exc">${d.excess > 0 ? '+'+fmt(d.excess) : '-'}</span>`;
  spEl.appendChild(row);
});

const spSel = document.getElementById('spFilter');
Object.keys(sp).forEach(name => {
  const o = document.createElement('option');
  o.value = name; o.textContent = name;
  spSel.appendChild(o);
});

function renderTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const r = document.getElementById('riskFilter').value;
  const p = document.getElementById('spFilter').value;
  const rows = DATA.stores.filter(s =>
    (!q || s.name.toLowerCase().includes(q)) &&
    (!r || s.risk === r) &&
    (!p || s.salesperson === p)
  ).sort((a,b) => b.receivable - a.receivable);

  const tbody = document.getElementById('tBody');
  tbody.innerHTML = '';
  rows.forEach(s => {
    const exStyle = s.excess > 0 ? 'class="red"' : 'class="muted"';
    const exStr = s.excess > 0 ? '+'+fmt(s.excess) : fmt(s.excess);
    const ratioStr = s.collateral > 0 ? Math.round(s.ratio*100)+'%' : '—';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td title="${s.name}" style="max-width:160px;">${s.name}</td>
      <td>${s.salesperson}</td>
      <td class="num-r">${fmt(s.collateral)}</td>
      <td class="num-r">${fmt(s.receivable)}</td>
      <td class="num-r" ${exStyle}>${exStr}</td>
      <td class="num-r">${ratioStr}</td>
      <td style="text-align:center;"><span class="badge b-${s.risk}">${s.risk}</span></td>
    `;
    tbody.appendChild(tr);
  });
}

['input','change'].forEach(ev => {
  document.getElementById('search').addEventListener(ev, renderTable);
  document.getElementById('riskFilter').addEventListener(ev, renderTable);
  document.getElementById('spFilter').addEventListener(ev, renderTable);
});
renderTable();
