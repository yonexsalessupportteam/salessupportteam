*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Noto Sans KR',sans-serif;background:#f5f4f0;color:#1a1a18;font-size:14px}
.topbar{background:#fff;border-bottom:.5px solid #e0dfd8;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:101}
.topbar h1{font-size:17px;font-weight:500}
.topbar .sub{font-size:12px;color:#888780}
.cat-switch{display:flex;gap:0;background:#fff;padding:0 24px;border-bottom:.5px solid #e0dfd8;position:sticky;top:49px;z-index:100}
.cat-btn{padding:12px 24px;font-size:14px;cursor:pointer;border-bottom:3px solid transparent;color:#5f5e5a;font-weight:500;transition:.15s}
.cat-btn.active{border-bottom-color:#1a1a18;color:#1a1a18}
.cat-btn:hover:not(.active){color:#1a1a18;background:#f9f8f4}
.cat-page{display:none}
.cat-page.active{display:block}
.tabs{display:flex;gap:0;border-bottom:.5px solid #e0dfd8;background:#fff;padding:0 24px;position:sticky;top:93px;z-index:99;overflow-x:auto}
.tab{padding:10px 20px;font-size:14px;cursor:pointer;border-bottom:2px solid transparent;color:#5f5e5a;font-weight:400;transition:.15s;white-space:nowrap}
.tab.active{border-bottom-color:#1a1a18;color:#1a1a18;font-weight:500}
.tab:hover:not(.active){color:#1a1a18}
.page{display:none;padding:20px 24px;max-width:1200px;margin:0 auto}
.page.active{display:block}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi{background:#fff;border-radius:10px;padding:16px 18px;border:.5px solid #e0dfd8}
.kpi-label{font-size:12px;color:#888780;margin-bottom:8px}
.kpi-value{font-size:22px;font-weight:500}
.kpi-sub{font-size:11px;color:#b4b2a9;margin-top:4px}
.kpi.danger .kpi-value{color:#A32D2D}
.kpi.warn .kpi-value{color:#854F0B}
.kpi.clickable{cursor:pointer;transition:.15s}
.kpi.clickable:hover{border-color:#A32D2D;background:#FCEBEB}
.risk-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.pill{display:flex;align-items:center;gap:7px;padding:6px 14px;border-radius:999px;font-size:13px;font-weight:500;border:1px solid;cursor:pointer;transition:.15s;user-select:none}
.pill:hover{filter:brightness(0.96)}
.pill.selected{box-shadow:0 0 0 2px rgba(0,0,0,0.12) inset}
.p적정{background:#EAF3DE;color:#3B6D11;border-color:#97C459}
.p주의{background:#E6F1FB;color:#185FA5;border-color:#85B7EB}
.p경계{background:#FAEEDA;color:#854F0B;border-color:#FAC775}
.p위기{background:#FCEBEB;color:#A32D2D;border-color:#F09595}
.p관리{background:#f1efe8;color:#5f5e5a;border-color:#d3d1c7}
.p해당없음{background:#f1efe8;color:#888780;border-color:#d3d1c7}
.pill-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.p적정 .pill-dot{background:#3B6D11}.p주의 .pill-dot{background:#185FA5}
.p경계 .pill-dot{background:#854F0B}.p위기 .pill-dot{background:#A32D2D}
.p관리 .pill-dot{background:#5f5e5a}.p해당없음 .pill-dot{background:#888780}
.pill-expand{display:none;background:#fff;border:.5px solid #e0dfd8;border-radius:10px;padding:12px 14px;margin-bottom:20px}
.pill-expand.show{display:block}
.pill-expand-title{font-size:12px;font-weight:500;color:#5f5e5a;margin-bottom:10px}
.pill-store-row{display:flex;align-items:center;justify-content:space-between;padding:7px 4px;border-bottom:.5px solid #f1efe8;font-size:13px}
.pill-store-row:last-child{border-bottom:none}
.pill-store-name{font-weight:500}
.pill-store-meta{color:#888780;font-size:12px}
.pill-store-amt{font-variant-numeric:tabular-nums;text-align:right;min-width:90px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.card{background:#fff;border-radius:12px;padding:18px 20px;border:.5px solid #e0dfd8}
.card-title{font-size:13px;font-weight:500;color:#5f5e5a;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.toggle-btn{font-size:12px;padding:4px 10px;border-radius:999px;border:.5px solid #d3d1c7;background:#fff;cursor:pointer;color:#5f5e5a}
.toggle-btn.active{background:#A32D2D;color:#fff;border-color:#A32D2D}
.filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-bar input,.filter-bar select{font-size:13px;padding:6px 10px;border-radius:8px;border:.5px solid #d3d1c7;background:#fff;color:#1a1a18;outline:none}
.filter-bar input{flex:1;min-width:140px}
.table-wrap{overflow:auto;max-height:420px}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
thead th{position:sticky;top:0;background:#f5f4f0;padding:8px 10px;text-align:left;font-weight:500;font-size:12px;color:#5f5e5a;border-bottom:.5px solid #e0dfd8;white-space:nowrap}
tbody td{padding:9px 10px;border-bottom:.5px solid #f1efe8;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tbody tr:hover{background:#f9f8f4}
.badge{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:500}
.b적정{background:#EAF3DE;color:#3B6D11}.b주의{background:#E6F1FB;color:#185FA5}
.b경계{background:#FAEEDA;color:#854F0B}.b위기{background:#FCEBEB;color:#A32D2D}
.b관리{background:#f1efe8;color:#5f5e5a}.b해당없음{background:#f1efe8;color:#888780}
.nr{text-align:right;font-variant-numeric:tabular-nums}
.red{color:#A32D2D}.muted{color:#b4b2a9}
.sp-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sp-name{font-size:13px;font-weight:500;min-width:48px}
.sp-bg{flex:1;height:8px;background:#e0dfd8;border-radius:4px;overflow:hidden}
.sp-fill{height:100%;border-radius:4px}
.sp-val{font-size:12px;color:#5f5e5a;min-width:70px;text-align:right}
.sp-exc{font-size:12px;color:#A32D2D;min-width:70px;text-align:right}

function fmt(n){
  const a=Math.abs(n), sign=n<0?'-':'';
  if(a>=1e8) return sign+'₩'+(Math.round(a/1e7)/10).toFixed(1)+'억';
  if(a>=1e6) return sign+'₩'+Math.round(a/1e6)+'백만';
  return sign+'₩'+Math.round(a).toLocaleString('ko-KR');
}

    <div class="kpi"><div class="kpi-label">총 채권잔액</div><div class="kpi-value">${fmt(s.total_receivable)}</div><div class="kpi-sub">ERP 기준</div></div>
    <div class="kpi"><div class="kpi-label">총 담보</div><div class="kpi-value">${fmt(s.total_collateral)}</div><div class="kpi-sub">해당 부서 합산</div></div>
    <div class="kpi danger clickable" id="excess-kpi-${key}"><div class="kpi-label">담보초과 채권 (클릭하여 보기)</div><div class="kpi-value">${fmt(s.total_excess)}</div><div class="kpi-sub">${exCnt}개 매장 초과</div></div>
    <div class="kpi warn"><div class="kpi-label">경계·위기 매장</div><div class="kpi-value">${hiCnt}개</div><div class="kpi-sub">아래 단계 클릭시 목록 표시</div></div>
  </div>`;

  const pillHtml=allRisks.map(r=>`<div class="pill p${r}" id="pill-${key}-${r}" onclick="togglePillExpand('${key}','${r}')"><span class="pill-dot"></span>${r} ${s.risk_counts[r]||0}개</div>`).join('');

  const chartId='chart-'+key;
  const tblId='tbl-'+key;
  const spId='sp-'+key;
  const searchId='srch-'+key;
  const riskId='risk-'+key;
  const spFilterId='spf-'+key;
  const toggleId='toggle-'+key;
  const expandId='expand-'+key;
  const subtotalId='subtotal-'+key;

  el.innerHTML=kpiHtml+`
  <div class="risk-pills">${pillHtml}</div>
  <div class="pill-expand" id="${expandId}"></div>
  <div class="two-col">
    <div class="card">
      <div class="card-title">담보초과 채권 상위 매장 (단위: 백만원)</div>
      <div style="position:relative;width:100%;height:300px"><canvas id="${chartId}" role="img" aria-label="담보초과 상위 매장"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">영업사원별 채권잔액</div>
      <div id="${spId}" style="margin-top:4px"></div>
      <div style="margin-top:14px;border-top:.5px solid #e0dfd8;padding-top:10px">
        <div class="leg-row"><span class="leg-sq" style="background:#378ADD"></span>채권잔액</div>
        <div class="leg-row"><span class="leg-sq" style="background:#E24B4A"></span>초과채권</div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">
      <span>전체 거래선 채권 현황 (${d.stores.length}개)</span>
      <button class="toggle-btn" id="${toggleId}" onclick="toggleExcess('${key}')">담보초과만 보기</button>
    </div>
    <div class="filter-bar">
      <input id="${searchId}" type="text" placeholder="매장명 검색..."/>
      <select id="${riskId}"><option value="">전체 위험도</option><option>위기</option><option>경계</option><option>주의</option><option>적정</option><option>관리</option></select>
      <select id="${spFilterId}"><option value="">전체 영업사원</option></select>
    </div>
    <div class="table-wrap"><table>
      <thead><tr>
        <th style="width:160px">매장명</th><th style="width:60px">담당</th>
        <th style="width:90px" class="nr">담보</th><th style="width:100px" class="nr">채권잔액</th>
        <th style="width:100px" class="nr">초과금액</th><th style="width:70px" class="nr">담보비율</th>
        <th style="width:65px;text-align:center">단계</th>
      </tr></thead>
      <tbody id="${tblId}"></tbody>
    </table></div>
    <div id="${subtotalId}" style="display:none;margin-top:10px;padding-top:10px;border-top:1px solid #d3d1c7;font-size:13px"></div>
  </div>`;

  document.getElementById('excess-kpi-'+key).addEventListener('click', ()=>toggleExcess(key, true));

  const topStores=d.stores.filter(x=>x.excess>0).sort((a,b)=>b.excess-a.excess).slice(0,10);
  if(chartRegistry[chartId]) chartRegistry[chartId].destroy();
  if(topStores.length>0){
    chartRegistry[chartId]=new Chart(document.getElementById(chartId),{
      type:'bar',
      data:{
        labels:topStores.map(s=>s.name.length>10?s.name.slice(0,10)+'…':s.name),
        datasets:[{data:topStores.map(s=>Math.round(s.excess/1e6)),backgroundColor:topStores.map(s=>riskColors[s.risk]||'#378ADD'),borderRadius:4,borderSkipped:false}]
      },
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'₩'+Math.round(c.raw)+'백만'}}},
        scales:{x:{ticks:{callback:v=>v+'M',font:{size:11}},grid:{color:'rgba(0,0,0,0.06)'}},y:{ticks:{font:{size:11}}}}}
    });
  }

  const spEl=document.getElementById(spId);
  const sp=d.by_salesperson;
  const maxR=Math.max(...Object.values(sp).map(x=>x.receivable),1);
  Object.entries(sp).sort((a,b)=>b[1].receivable-a[1].receivable).forEach(([name,dd])=>{
    const pct=Math.round(dd.receivable/maxR*100);
    const color=spColors[name]||'#378ADD';
    const row=document.createElement('div');
    row.className='sp-row';
    row.innerHTML=`<span class="sp-name">${name}</span><div class="sp-bg"><div class="sp-fill" style="width:${pct}%;background:${color}"></div></div><span class="sp-val">${fmt(dd.receivable)}</span><span class="sp-exc">${dd.excess>0?'+'+fmt(dd.excess):'-'}</span>`;
    spEl.appendChild(row);
  });

  const spSel=document.getElementById(spFilterId);
  Object.keys(sp).forEach(name=>{const o=document.createElement('option');o.value=name;o.textContent=name;spSel.appendChild(o);});

  document.getElementById(searchId).addEventListener('input',()=>renderTable(cat,dept));
  document.getElementById(riskId).addEventListener('change',()=>renderTable(cat,dept));
  document.getElementById(spFilterId).addEventListener('change',()=>renderTable(cat,dept));
  renderTable(cat,dept);
}

function togglePillExpand(key, risk){
  const expandEl=document.getElementById('expand-'+key);
  allRisks.forEach(r=>{
    const p=document.getElementById('pill-'+key+'-'+r);
    if(p) p.classList.remove('selected');
  });

  if(expandedRisk[key]===risk){
    expandedRisk[key]=null;
    expandEl.classList.remove('show');
    expandEl.innerHTML='';
    return;
  }
  expandedRisk[key]=risk;
  document.getElementById('pill-'+key+'-'+risk).classList.add('selected');

  const parts=key.split('-');
  const cat=parts[0], dept=parts.slice(1).join('-');
  const d=DATA[cat][dept];
  const stores=d.stores.filter(s=>s.risk===risk).sort((a,b)=>a.name.localeCompare(b.name,'ko'));

  if(stores.length===0){
    expandEl.innerHTML=`<div class="pill-expand-title">${risk} 단계 매장 (0개)</div><div style="color:var(--color-text-tertiary,#b4b2a9);font-size:13px">해당 단계 매장이 없습니다.</div>`;
  } else {
    const rows=stores.map(s=>`
      <div class="pill-store-row">
        <div><span class="pill-store-name">${s.name}</span> <span class="pill-store-meta">· ${s.salesperson}</span></div>
        <div class="pill-store-amt">${fmt(s.receivable)}${s.collateral>0?' / 담보비율 '+Math.round(s.ratio*100)+'%':''}</div>
      </div>`).join('');
    expandEl.innerHTML=`<div class="pill-expand-title">${risk} 단계 매장 (${stores.length}개)</div>${rows}`;
  }
  expandEl.classList.add('show');
}

function toggleExcess(key, forceOn){
  excessOnly[key] = forceOn ? true : !excessOnly[key];
  const btn=document.getElementById('toggle-'+key);
  if(excessOnly[key]){ btn.classList.add('active'); btn.textContent='전체 보기'; }
  else { btn.classList.remove('active'); btn.textContent='담보초과만 보기'; }
  const parts=key.split('-');
  const cat=parts[0], dept=parts.slice(1).join('-');
  renderTable(cat,dept);
}

function renderTable(cat, dept){
  const key=pageKey(cat,dept);
  const d=DATA[cat][dept];
  const searchId='srch-'+key, riskId='risk-'+key, spFilterId='spf-'+key, tblId='tbl-'+key;
  const q=document.getElementById(searchId).value.toLowerCase();
  const r=document.getElementById(riskId).value;
  const p=document.getElementById(spFilterId).value;
  let rows=d.stores.filter(s=>(!q||s.name.toLowerCase().includes(q))&&(!r||s.risk===r)&&(!p||s.salesperson===p));
  if(excessOnly[key]) rows=rows.filter(s=>s.excess>0).sort((a,b)=>b.excess-a.excess);
  const tbody=document.getElementById(tblId);
  tbody.innerHTML='';
  rows.forEach(s=>{
    const exStyle=s.excess>0?'class="red"':'class="muted"';
    const exStr=s.excess>0?'+'+fmt(s.excess):fmt(s.excess);
    const ratioStr=s.collateral>0?Math.round(s.ratio*100)+'%':'—';
    const tr=document.createElement('tr');
    tr.innerHTML=`<td title="${s.name}">${s.name}</td><td>${s.salesperson}</td><td class="nr">${fmt(s.collateral)}</td><td class="nr">${fmt(s.receivable)}</td><td class="nr" ${exStyle}>${exStr}</td><td class="nr">${ratioStr}</td><td style="text-align:center"><span class="badge b${s.risk}">${s.risk}</span></td>`;
    tbody.appendChild(tr);
  });

  const subtotalEl=document.getElementById('subtotal-'+key);
  if(p || r || q){
    const totalCollateral=rows.reduce((sum,x)=>sum+x.collateral,0);
    const totalReceivable=rows.reduce((sum,x)=>sum+x.receivable,0);
    const totalExcess=rows.reduce((sum,x)=>sum+(x.excess>0?x.excess:0),0);
    const labelParts=[];
    if(p) labelParts.push(p);
    if(r) labelParts.push(r);
    if(q) labelParts.push('"'+q+'"');
    const label=labelParts.length?labelParts.join(' · ')+' 소계':'필터 소계';
    subtotalEl.innerHTML=`<strong>${label}</strong> (${rows.length}개) — 담보 ${fmt(totalCollateral)} · 채권잔액 ${fmt(totalReceivable)} · 초과채권 <span class="red">${fmt(totalExcess)}</span>`;
    subtotalEl.style.display='block';
  } else {
    subtotalEl.style.display='none';
  }
}

function switchTab(cat, dept, el){
  const tabsContainer = el.parentElement;
  tabsContainer.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  const catPage = document.getElementById('cat-'+cat);
  catPage.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+pageKey(cat,dept)).classList.add('active');
  const key=pageKey(cat,dept);
  if(!builtPages[key]){
    buildPage(cat,dept);
    builtPages[key]=true;
  }
}

function switchCat(cat, el){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.cat-page').forEach(p=>p.classList.remove('active'));
  document.getElementById('cat-'+cat).classList.add('active');
}

buildPage('의류','인사총무팀');
builtPages['의류-인사총무팀']=true;
buildPage('용품','인사총무팀');
builtPages['용품-인사총무팀']=true;
</script>
</body>
</html>
