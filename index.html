<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대리점 종합평가</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Noto Sans KR',sans-serif;background:#f5f4f0;color:#1a1a18;font-size:14px}
.topbar{background:#1a6abf;border-bottom:.5px solid #155399;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:101}
.topbar-logo{height:36px;object-fit:contain}
.topbar-center{position:absolute;left:50%;transform:translateX(-50%);text-align:center}
.topbar-center h1{font-size:17px;font-weight:500;color:#fff}
.topbar .sub{font-size:12px;color:rgba(255,255,255,0.7)}
.layout{display:flex;min-height:calc(100vh - 57px)}
.sidebar{width:200px;flex-shrink:0;background:#fff;border-right:.5px solid #e0dfd8;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto}
.sidebar-section{padding:16px 12px 8px;font-size:11px;font-weight:600;color:#b4b2a9;text-transform:uppercase;letter-spacing:0.06em}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:14px;cursor:pointer;color:#5f5e5a;font-weight:400;transition:.15s;border-left:3px solid transparent}
.sidebar-item:hover{background:#f5f4f0;color:#1a1a18}
.sidebar-item.active{background:#f5f4f0;color:#1a1a18;font-weight:500;border-left-color:#1a1a18}
.sidebar-item .icon{font-size:16px;width:20px;text-align:center}
.sidebar-divider{height:.5px;background:#e0dfd8;margin:8px 0}
.main-content{flex:1;overflow:visible}
.cat-page{display:none}
.cat-page.active{display:block}
.tabs{display:flex;gap:0;border-bottom:.5px solid #e0dfd8;background:#fff;padding:0 24px;position:sticky;top:57px;z-index:99;overflow-x:auto}
.tab{padding:10px 20px;font-size:14px;cursor:pointer;border-bottom:2px solid transparent;color:#5f5e5a;font-weight:400;transition:.15s;white-space:nowrap}
.tab.active{border-bottom-color:#1a1a18;color:#1a1a18;font-weight:500}
.tab:hover:not(.active){color:#1a1a18}
.page{display:none;padding:28px 24px 20px;max-width:1200px;margin:0 auto}
.page.active{display:block}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi{background:#fff;border-radius:10px;padding:16px 18px;border:.5px solid #e0dfd8}
.kpi-label{font-size:12px;color:#888780;margin-bottom:8px}
.kpi-value{font-size:22px;font-weight:500}
.kpi-sub{font-size:11px;color:#b4b2a9;margin-top:4px}
.kpi.danger .kpi-value{color:#A32D2D}
.kpi.warn .kpi-value{color:#854F0B}
.kpi.clickable{cursor:pointer;transition:.15s}
.kpi.clickable:hover{border-color:#A32D2D;background:#FCEBEB}
.risk-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.pill{display:flex;align-items:center;gap:7px;padding:6px 14px;border-radius:999px;font-size:13px;font-weight:500;border:1px solid;cursor:pointer;transition:.15s;user-select:none}
.pill:hover{filter:brightness(0.96)}
.pill.selected{box-shadow:0 0 0 2px rgba(0,0,0,0.12) inset}
.p적정{background:#EAF3DE;color:#3B6D11;border-color:#97C459}
.p주의{background:#E6F1FB;color:#185FA5;border-color:#85B7EB}
.p경계{background:#FAEEDA;color:#854F0B;border-color:#FAC775}
.p위기{background:#FCEBEB;color:#A32D2D;border-color:#F09595}
.p관리{background:#f1efe8;color:#5f5e5a;border-color:#d3d1c7}
.p해당없음{background:#f1efe8;color:#888780;border-color:#d3d1c7}
.pill-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.p적정 .pill-dot{background:#3B6D11}.p주의 .pill-dot{background:#185FA5}
.p경계 .pill-dot{background:#854F0B}.p위기 .pill-dot{background:#A32D2D}
.p관리 .pill-dot{background:#5f5e5a}.p해당없음 .pill-dot{background:#888780}
.pill-expand{display:none;background:#fff;border:.5px solid #e0dfd8;border-radius:10px;padding:12px 14px;margin-bottom:20px}
.pill-expand.show{display:block}
.pill-expand-title{font-size:12px;font-weight:500;color:#5f5e5a;margin-bottom:10px}
.pill-store-row{display:flex;align-items:center;justify-content:space-between;padding:7px 4px;border-bottom:.5px solid #f1efe8;font-size:13px}
.pill-store-row:last-child{border-bottom:none}
.pill-store-name{font-weight:500}
.pill-store-meta{color:#888780;font-size:12px}
.pill-store-amt{font-variant-numeric:tabular-nums;text-align:right;min-width:90px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.card{background:#fff;border-radius:12px;padding:18px 20px;border:.5px solid #e0dfd8}
.card-title{font-size:13px;font-weight:500;color:#5f5e5a;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.toggle-btn{font-size:12px;padding:4px 10px;border-radius:999px;border:.5px solid #d3d1c7;background:#fff;cursor:pointer;color:#5f5e5a}
.toggle-btn.active{background:#A32D2D;color:#fff;border-color:#A32D2D}
.filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-bar input,.filter-bar select{font-size:13px;padding:6px 10px;border-radius:8px;border:.5px solid #d3d1c7;background:#fff;color:#1a1a18;outline:none}
.filter-bar input{flex:1;min-width:140px}
.table-wrap{overflow:auto;max-height:420px}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
thead th{position:sticky;top:0;background:#f5f4f0;padding:8px 10px;text-align:left;font-weight:500;font-size:12px;color:#5f5e5a;border-bottom:.5px solid #e0dfd8;white-space:nowrap}
tbody td{padding:9px 10px;border-bottom:.5px solid #f1efe8;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tbody tr:hover{background:#f9f8f4}
.badge{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:500}
.b적정{background:#EAF3DE;color:#3B6D11}.b주의{background:#E6F1FB;color:#185FA5}
.b경계{background:#FAEEDA;color:#854F0B}.b위기{background:#FCEBEB;color:#A32D2D}
.b관리{background:#f1efe8;color:#5f5e5a}.b해당없음{background:#f1efe8;color:#888780}
.nr{text-align:right;font-variant-numeric:tabular-nums}
.red{color:#A32D2D}.muted{color:#b4b2a9}
.sp-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sp-name{font-size:13px;font-weight:500;min-width:48px}
.sp-bg{flex:1;height:8px;background:#e0dfd8;border-radius:4px;overflow:hidden}
.sp-fill{height:100%;border-radius:4px}
.sp-val{font-size:12px;color:#5f5e5a;min-width:70px;text-align:right}
.sp-exc{font-size:12px;color:#A32D2D;min-width:70px;text-align:right}
.leg-row{display:flex;align-items:center;gap:6px;font-size:12px;color:#888780;margin-bottom:5px}
.leg-sq{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.cs-select{font-size:12px;padding:3px 6px;border-radius:6px;border:.5px solid #d3d1c7;background:#fff;cursor:pointer;color:#1a1a18}
.cs-label{display:flex;align-items:center;gap:6px}
.cs-desc{font-size:11px;color:#888780}
.dept-filter-btn{font-size:13px;padding:6px 16px;border-radius:999px;border:.5px solid #d3d1c7;background:#fff;cursor:pointer;color:#5f5e5a;transition:.15s}
.dept-filter-btn:hover{background:#f5f4f0}
.dept-filter-btn.active{background:#1a1a18;color:#fff;border-color:#1a1a18}
.ai-dash{padding:24px;max-width:1200px;margin:0 auto}
.ai-kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:20px}
.ai-kpi{background:#fff;border-radius:10px;padding:14px 16px;border:.5px solid #e0dfd8}
.ai-kpi .lbl{font-size:12px;color:#888780;margin-bottom:6px}
.ai-kpi .val{font-size:20px;font-weight:500;color:#1a1a18}
.ai-kpi .val.g{color:#0F6E56}.ai-kpi .val.r{color:#A32D2D}.ai-kpi .val.a{color:#854F0B}
.ai-filter-tag{font-size:12px;padding:5px 12px;border-radius:20px;border:.5px solid #e0dfd8;cursor:pointer;color:#5f5e5a;background:#fff}
.ai-filter-tag.active{background:#1a1a18;color:#fff;border-color:#1a1a18}
.ai-filter-tag.safe{background:#EAF3DE;color:#27500A;border-color:#C0DD97}
.ai-filter-tag.caution{background:#FAEEDA;color:#633806;border-color:#FAC775}
.ai-filter-tag.border2{background:#FAECE7;color:#712B13;border-color:#F5C4B3}
.ai-filter-tag.crisis{background:#FCEBEB;color:#791F1F;border-color:#F7C1C1}
.dealer-card{background:#fff;border:.5px solid #e0dfd8;border-radius:12px;padding:14px 18px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.dealer-card:hover{border-color:#b4b2a9}
.dealer-card.sel{border:1.5px solid #185FA5}
.crow{display:flex;align-items:center;gap:12px}
.rank-badge{font-size:13px;color:#888780;width:22px;text-align:center}
.sinfo{flex:1;min-width:0}
.sname{font-size:14px;font-weight:500;color:#1a1a18}
.smeta{font-size:12px;color:#888780;margin-top:2px}
.bwrap{flex:1;max-width:140px}
.blbl{font-size:11px;color:#888780;margin-bottom:3px}
.btrack{height:5px;background:#f1efe8;border-radius:3px;overflow:hidden}
.bfill{height:100%;border-radius:3px}
.snum{font-size:17px;font-weight:500;color:#1a1a18;text-align:right}
.sunit{font-size:11px;color:#888780}
.rpill{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;white-space:nowrap}
.rp-safe{background:#EAF3DE;color:#27500A}
.rp-caution{background:#FAEEDA;color:#633806}
.rp-border{background:#FAECE7;color:#712B13}
.rp-crisis{background:#FCEBEB;color:#791F1F}
.det-panel{background:#fff;border:.5px solid #e0dfd8;border-radius:12px;padding:18px 20px;margin-bottom:8px}
.det-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:.5px solid #e0dfd8}
.det-title{font-size:15px;font-weight:500;color:#1a1a18}
.det-sub{font-size:12px;color:#888780;margin-top:3px}
.sec-label{font-size:11px;font-weight:500;color:#5f5e5a;letter-spacing:0.03em;margin-bottom:8px;padding:3px 8px;background:#f5f4f0;border-radius:6px;display:inline-block}
.cat-section{margin-bottom:14px}
.cat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.dc{background:#f5f4f0;border-radius:8px;padding:12px}
.dc .dl{font-size:11px;color:#888780;margin-bottom:3px}
.dc .dv{font-size:14px;font-weight:500;color:#1a1a18}
.dc .dsub{font-size:11px;color:#888780;margin-top:2px}
.over-bar{height:5px;background:#e0dfd8;border-radius:3px;overflow:hidden;margin-top:5px}
.over-fill{height:100%;border-radius:3px}
.kw-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.kw-tag{font-size:11px;padding:2px 8px;border-radius:20px;background:#f1efe8;color:#5f5e5a;border:.5px solid #e0dfd8}
.kw-tag.danger{background:#FCEBEB;color:#791F1F;border-color:#F7C1C1}
.kw-tag.safe{background:#EAF3DE;color:#27500A;border-color:#C0DD97}
.partner-box{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;align-items:center}
.partner-item{display:flex;align-items:center;gap:10px;background:#f5f4f0;border-radius:8px;padding:10px 14px;min-width:160px;transition:.2s}
.partner-item.violation{background:#FCEBEB;border:.5px solid #F09595}
.partner-label{font-size:12px;color:#5f5e5a;font-weight:500}
.partner-status{font-size:12px;font-weight:600}
.partner-status.ok{color:#0F6E56}
.partner-status.ng{color:#A32D2D}
.partner-pts{font-size:11px;color:#888780;margin-left:2px}
.partner-total{display:flex;align-items:center;gap:6px;background:#f5f4f0;border-radius:8px;padding:10px 14px}
.toggle-switch{position:relative;width:40px;height:22px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#d3d1c7;border-radius:22px;transition:.2s}
.toggle-slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle-switch input:checked+.toggle-slider{background:#E24B4A}
.toggle-switch input:checked+.toggle-slider:before{transform:translateX(18px)}
.partner-saving{font-size:11px;color:#888780;margin-left:4px;display:none}
.gauge-wrap{display:flex;flex-direction:column;align-items:center;margin:12px 0;}
.gauge-btns{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:10px;}
.gauge-btn{font-size:11px;padding:4px 10px;border-radius:20px;cursor:pointer;font-family:sans-serif;transition:.15s;}
@media(max-width:700px){.kpi-grid{grid-template-columns:1fr 1fr}.two-col{grid-template-columns:1fr}.ai-kpi-grid{grid-template-columns:1fr 1fr}.cat-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div class="topbar">
  <img src="logo.jpg" alt="YONEX" class="topbar-logo">
  <div class="topbar-center"><h1>대리점 종합평가</h1></div>
  <span class="sub">2026.07.02(목) 19:19 업데이트</span>
</div>

<div class="layout">
<div class="sidebar">
  <div class="sidebar-section">AI 리스크</div>
  <div class="sidebar-item active" id="menu-ai-risk" onclick="switchCat('ai-risk',this)">
    <span class="icon">🤖</span> AI 위험탐지
  </div>
  <div class="sidebar-divider"></div>
  <div class="sidebar-section">팀별 채권잔액</div>
  <div class="sidebar-item" id="menu-의류" onclick="switchCat('의류',this)">
    <span class="icon">👔</span> 의류
  </div>
  <div class="sidebar-item" id="menu-용품" onclick="switchCat('용품',this)">
    <span class="icon">🏸</span> 용품
  </div>
</div>

<div class="main-content">

<div id="cat-ai-risk" class="cat-page active">
  <div class="ai-dash" id="ai-dash-content">
    <div style="color:#888780;font-size:14px;padding:40px 0;text-align:center">데이터 로딩 중...</div>
  </div>
</div>

<div id="cat-의류" class="cat-page">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('의류','영업1팀',this)">영업1팀</div>
    <div class="tab" onclick="switchTab('의류','영업2팀',this)">영업2팀</div>
    <div class="tab" onclick="switchTab('의류','E-BIZ팀',this)">E-BIZ팀</div>
  </div>
  <div id="page-의류-영업1팀" class="page active"></div>
  <div id="page-의류-영업2팀" class="page"></div>
  <div id="page-의류-E-BIZ팀" class="page"></div>
</div>

<div id="cat-용품" class="cat-page">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('용품','영업1팀',this)">영업1팀</div>
    <div class="tab" onclick="switchTab('용품','영업2팀',this)">영업2팀</div>
    <div class="tab" onclick="switchTab('용품','E-BIZ팀',this)">E-BIZ팀</div>
  </div>
  <div id="page-용품-영업1팀" class="page active"></div>
  <div id="page-용품-영업2팀" class="page"></div>
  <div id="page-용품-E-BIZ팀" class="page"></div>
</div>

</div>
</div>

<script>

function buildScoreSection(s){
  const dcStyle = function(deduct){ return deduct>0 ? 'background:#FCEBEB;border:.5px solid #F09595' : ''; };
  const dvColor = function(v,hi,mid){ return v>=hi ? '#0F6E56' : v>=mid ? '#185FA5' : '#A32D2D'; };
  const collLabelFor = function(days){ return days<=60 ? '✓ 60일이내' : days<=80 ? '60~80일' : days<=90 ? '80~90일' : '90일초과'; };
  const clRatioVal = s.clothing&&s.clothing.collateral>0 ? Math.round(s.clothing.receivable/s.clothing.collateral*100) : null;
  const gdRatioVal = s.goods&&s.goods.collateral>0 ? Math.round(s.goods.receivable/s.goods.collateral*100) : null;
  const deductCollateral = Math.min(25, (s.deductCollateralClothing||0)+(s.deductCollateralGoods||0));
  const deductCollection = Math.min(25, (s.deductCollectionClothing||0)+(s.deductCollectionGoods||0));
  const goodsPartner = s.pGoods&&s.pGoods.trim() ? '미준수' : '준수';
  const clothPartner = s.pClothing&&s.pClothing.trim() ? '미준수' : '준수';
  const memoLabel = s.memo ? '메모기반AI분석' : '메모없음(만점)';
  return '<div style="margin-bottom:14px">'
    +'<div class="sec-label">📊 평가 점수 현황</div>'
    +'<div class="cat-grid" style="margin-top:8px">'
    +(s.clothing?(
    '<div class="dc" style="'+dcStyle(s.deductCollectionClothing)+'">'
    +'<div class="dl">회수일 감점 (의류)</div>'
    +'<div class="dv" style="color:'+(s.deductCollectionClothing===0?'#0F6E56':'#A32D2D')+'">'+(s.deductCollectionClothing===0?'없음':'-'+s.deductCollectionClothing+'점')+' <span style="font-size:11px;color:#888780">/'+(s.goods?'15':'25')+'</span></div>'
    +'<div class="dsub">당월 '+(s.collectionDaysClothing||0)+'일 '+collLabelFor(s.collectionDaysClothing||0)+'</div></div>'
    ):'')
    +(s.goods?(
    '<div class="dc" style="'+dcStyle(s.deductCollectionGoods)+'">'
    +'<div class="dl">회수일 감점 (용품)</div>'
    +'<div class="dv" style="color:'+(s.deductCollectionGoods===0?'#0F6E56':'#A32D2D')+'">'+(s.deductCollectionGoods===0?'없음':'-'+s.deductCollectionGoods+'점')+' <span style="font-size:11px;color:#888780">/'+(s.clothing?'15':'25')+'</span></div>'
    +'<div class="dsub">당월 '+(s.collectionDaysGoods||0)+'일 '+collLabelFor(s.collectionDaysGoods||0)+'</div></div>'
    ):'')
    +(s.clothing?(
    '<div class="dc" style="'+dcStyle(s.deductCollateralClothing)+'">'
    +'<div class="dl">담보대비 감점 (의류)</div>'
    +'<div class="dv" style="color:'+(s.deductCollateralClothing===0?'#0F6E56':'#A32D2D')+'">'+(s.deductCollateralClothing===0?'없음':'-'+s.deductCollateralClothing+'점')+' <span style="font-size:11px;color:#888780">/'+(s.goods?'15':'25')+'</span></div>'
    +'<div class="dsub">'+(clRatioVal!=null?clRatioVal+'%':'담보없음')+'</div></div>'
    ):'')
    +(s.goods?(
    '<div class="dc" style="'+dcStyle(s.deductCollateralGoods)+'">'
    +'<div class="dl">담보대비 감점 (용품)</div>'
    +'<div class="dv" style="color:'+(s.deductCollateralGoods===0?'#0F6E56':'#A32D2D')+'">'+(s.deductCollateralGoods===0?'없음':'-'+s.deductCollateralGoods+'점')+' <span style="font-size:11px;color:#888780">/'+(s.clothing?'15':'25')+'</span></div>'
    +'<div class="dsub">'+(gdRatioVal!=null?gdRatioVal+'%':'담보없음')+'</div></div>'
    ):'')
    +'<div class="dc">'
    +'<div class="dl">정량점수</div>'
    +'<div class="dv" style="color:'+dvColor(s.quantScore,42,33)+'">'+s.quantScore+'점 <span style="font-size:11px;color:#888780">/50</span></div>'
    +'<div class="dsub">50-'+deductCollection+'-'+deductCollateral+'</div></div>'
    +'<div class="dc">'
    +'<div class="dl">CS 코멘트</div>'
    +'<div class="dv" style="color:'+dvColor(s.csScore,16,10)+'">'+s.csScore+'점 <span style="font-size:11px;color:#888780">/20</span></div>'
    +'<div class="dsub">'+memoLabel+'</div></div>'
    +'<div class="dc">'
    +'<div class="dl">파트너십</div>'

function fmt(n){
  const a=Math.abs(n),sign=n<0?'-':'';
  if(a>=1e8) return sign+'₩'+(Math.round(a/1e7)/10).toFixed(1)+'억';
  if(a>=1e6) return sign+'₩'+Math.round(a/1e6)+'백만';
  return sign+'₩'+Math.round(a).toLocaleString('ko-KR');
}

function updatePartnership(storeName, field, isViolation, idx){
  const value = isViolation ? '미준수' : '';
  const cat = field === 'p_goods' ? 'goods' : 'clothing';

  // UI 즉시 반영
  const item = document.getElementById('pitem-'+cat+'-'+idx);
  const status = document.getElementById('pstatus-'+cat+'-'+idx);
  const pts = document.getElementById('ppts-'+cat+'-'+idx);
  const saving = document.getElementById('psaving-'+idx);
  const totalEl = document.getElementById('ptotal-'+idx);

  if(isViolation){
    item.classList.add('violation');
    status.textContent='미준수'; status.className='partner-status ng';
    pts.textContent='(0점)';
  } else {
    item.classList.remove('violation');
    status.textContent='준수'; status.className='partner-status ok';
    pts.textContent='(15점)';
  }

  // 파트너십 총점 재계산
  const goodsChecked = document.getElementById('ptoggle-goods-'+idx).checked;
  const clothingChecked = document.getElementById('ptoggle-clothing-'+idx).checked;
  const newTotal = (goodsChecked?0:15) + (clothingChecked?0:15);
  totalEl.innerHTML = `${newTotal}<span style="font-size:11px;font-weight:400;color:#888780">/30</span>`;
  totalEl.style.color = newTotal < 30 ? '#A32D2D' : '#0F6E56';

  // 구글 시트에 저장 (GET 방식)
  saving.style.display='inline';
  const params = new URLSearchParams({store_name: storeName, field, value});
  fetch(`${APPS_SCRIPT_URL}?${params}`, {method:'GET', mode:'no-cors'})
  .then(()=>{
    saving.textContent='✓ 저장됨';
    setTimeout(()=>{saving.style.display='none'; saving.textContent='저장 중...';}, 2000);
  })
  .catch(()=>{
    saving.textContent='⚠ 저장 실패';
    setTimeout(()=>{saving.style.display='none'; saving.textContent='저장 중...';}, 2000);
  });
}

function getRiskClass(score){
  if(score>=80) return {label:'안전',cls:'rp-safe',bar:'#1D9E75'};
  if(score>=60) return {label:'주의',cls:'rp-caution',bar:'#EF9F27'};
  if(score>=40) return {label:'경계',cls:'rp-border',bar:'#EF9F27'};
  return {label:'위기',cls:'rp-crisis',bar:'#E24B4A'};
}

          ? `<span style="margin-left:6px;font-size:10px;font-weight:600;color:#A32D2D;background:#FCEBEB;padding:2px 7px;border-radius:10px">⚠️ AI가 더 심각하게 판단</span>`
          : `<span style="margin-left:6px;font-size:10px;font-weight:600;color:#5f5e5a;background:#f0efe9;padding:2px 7px;border-radius:10px">AI가 더 완화하여 판단</span>`)
      : '';

    html+=`
    <div class="dealer-card" id="aicard-${i}" data-grade="${rc.label}" data-dept="${s.dept}" data-cat="${s.catLabel}" data-name="${s.name}" onclick="toggleAiDet(${i},this)">
      <div class="crow">
        <div class="rank-badge">${i+1}</div>
        <div class="sinfo"><div class="sname">${s.name}</div><div class="smeta">${s.dept} · ${s.salesperson} · ${s.catLabel}</div></div>
        <div class="bwrap"><div class="blbl">종합점수</div><div class="btrack"><div class="bfill" style="width:${barW}%;background:${rc.bar}"></div></div></div>
        <div style="text-align:right"><div class="snum">${s.totalScore}</div><div class="sunit">/ 100</div></div>
        <span class="rpill ${rc.cls}">${rc.label}</span>
        ${s.aiMismatch&&s.aiMismatchDirection==='severe'?'<span style="margin-left:4px" title="AI가 기계적 등급보다 더 심각하게 판단함">⚠️</span>':''}
      </div>
    </div>
    <div class="det-panel" id="aidet-${i}" style="display:none">
      <div class="det-hdr">
        <div><div class="det-title">${s.name} 상세 분석</div><div class="det-sub">${s.dept} · 담당: ${s.salesperson} · ${s.catLabel}</div></div>
        <span class="rpill ${rc.cls}" style="font-size:12px;padding:4px 12px">${rc.label}</span>
      </div>
      ${clSec}${gdSec}
      <div style="height:.5px;background:#e0dfd8;margin:1rem 0"></div>
      ${buildScoreSection(s)}
      <div style="height:.5px;background:#e0dfd8;margin:1rem 0"></div>
      ${partnerSec}
      <div style="height:.5px;background:#e0dfd8;margin:1rem 0"></div>
      <div style="margin-bottom:1rem">
        <div class="sec-label">🤝 CS 평가 (공통)</div>
        ${kwHtml?('<div style="margin-top:8px"><div style="font-size:12px;color:#888780;margin-bottom:4px">입력 키워드</div><div class="kw-tags">'+kwHtml+'</div></div>'):''}
        ${s.memo?('<div style="margin-top:10px"><div style="font-size:12px;color:#888780;margin-bottom:4px">담당자 메모</div><div style="font-size:13px;color:#5f5e5a;line-height:1.6;background:#f5f4f0;padding:10px 12px;border-radius:8px">'+s.memo+'</div></div>'):''}
        ${(!kwHtml&&!s.memo)?'<div style="font-size:13px;color:#b4b2a9;margin-top:8px">메모를 입력하면 표시됩니다.</div>':''}
      </div>
      <div style="background:${aiBoxBg};border-radius:8px;padding:14px 16px;border-left:3px solid ${aiBoxBd}">
        <div style="font-size:11px;font-weight:500;color:${aiLblColor};margin-bottom:5px">🤖 AI 위험탐지 분석${s.aiAssessedRisk?` · AI 자체판단: <span style="font-weight:700">${s.aiAssessedRisk}</span>`:''}${mismatchBadge}</div>
        <div style="font-size:13px;color:${aiTxtColor};line-height:1.7">${aiCommentHtml}</div>
      </div>
    </div>`;
  });

  html+='</div>';
  cont.innerHTML=html;

  document.getElementById('ai-search').addEventListener('input',applyAiFilters);
  document.getElementById('ai-team-filter').addEventListener('change',applyAiFilters);
  document.getElementById('ai-cat-filter').addEventListener('change',applyAiFilters);
}

function filterAiTag(grade){
  currentAiGrade=grade;
  ['전체','안전','주의','경계','위기'].forEach(g=>{
    const el=document.getElementById('aitag-'+g);
    if(el) el.classList.toggle('active',g===grade);
  });
  applyAiFilters();
}

function applyAiFilters(){
  const q=(document.getElementById('ai-search')||{}).value?.toLowerCase()||'';
  const team=(document.getElementById('ai-team-filter')||{}).value||'';
  const cat=(document.getElementById('ai-cat-filter')||{}).value||'';
  document.querySelectorAll('.dealer-card').forEach(card=>{
    const det=document.getElementById('aidet-'+card.id.replace('aicard-',''));
    const gradeOk=currentAiGrade==='전체'||card.dataset.grade===currentAiGrade;
    const teamOk=!team||card.dataset.dept===team;
    const catOk=!cat||card.dataset.cat.includes(cat);
    const nameOk=!q||card.dataset.name.toLowerCase().includes(q);
    const show=gradeOk&&teamOk&&catOk&&nameOk;
    card.style.display=show?'':'none';
    if(det&&!show) det.style.display='none';
  });
}

function toggleAiDet(idx,card){
  const det=document.getElementById('aidet-'+idx);
  const isOpen=det.style.display!=='none';
  document.querySelectorAll('.dealer-card').forEach(c=>c.classList.remove('sel'));
  document.querySelectorAll('.det-panel').forEach(d=>d.style.display='none');
  if(!isOpen){card.classList.add('sel');det.style.display='block';}
}

function pageKey(cat,dept){return cat+'-'+dept;}

function buildPage(cat,dept){
  const key=pageKey(cat,dept);
  const d=DATA[cat][dept];
  const s=d.summary;
  const el=document.getElementById('page-'+key);
  el.innerHTML='';
  excessOnly[key]=false;
  expandedRisk[key]=null;
  const hiCnt=(s.risk_counts['위기']||0)+(s.risk_counts['경계']||0);
  const exCnt=d.stores.filter(x=>x.excess>0).length;
  const kpiHtml=`<div class="kpi-grid">
    <div class="kpi"><div class="kpi-label">총 채권잔액</div><div class="kpi-value">${fmt(s.total_receivable)}</div><div class="kpi-sub">ERP 기준</div></div>
    <div class="kpi"><div class="kpi-label">총 담보</div><div class="kpi-value">${fmt(s.total_collateral)}</div><div class="kpi-sub">해당 부서 합산</div></div>
    <div class="kpi danger clickable" id="excess-kpi-${key}"><div class="kpi-label">담보초과 채권 (클릭하여 보기)</div><div class="kpi-value">${fmt(s.total_excess)}</div><div class="kpi-sub">${exCnt}개 매장 초과</div></div>
    <div class="kpi warn"><div class="kpi-label">경계·위기 매장</div><div class="kpi-value">${hiCnt}개</div><div class="kpi-sub">아래 단계 클릭시 목록 표시</div></div>
  </div>`;
  const pillHtml=allRisks.map(r=>`<div class="pill p${r}" id="pill-${key}-${r}" onclick="togglePillExpand('${key}','${r}')"><span class="pill-dot"></span>${r} ${s.risk_counts[r]||0}개</div>`).join('');
  const chartId='chart-'+key,tblId='tbl-'+key,spId='sp-'+key,searchId='srch-'+key,riskId='risk-'+key,spFilterId='spf-'+key,toggleId='toggle-'+key,expandId='expand-'+key,subtotalId='subtotal-'+key;
  el.innerHTML=kpiHtml+`
  <div class="risk-pills">${pillHtml}</div>
  <div class="pill-expand" id="${expandId}"></div>
  <div class="two-col">
    <div class="card">
      <div class="card-title">담보초과 채권 상위 매장 (단위: 백만원)</div>
      <div style="position:relative;width:100%;height:300px"><canvas id="${chartId}"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">영업사원별 채권잔액</div>
      <div id="${spId}" style="margin-top:4px"></div>
      <div style="margin-top:14px;border-top:.5px solid #e0dfd8;padding-top:10px">
        <div class="leg-row"><span class="leg-sq" style="background:#378ADD"></span>채권잔액</div>
        <div class="leg-row"><span class="leg-sq" style="background:#E24B4A"></span>초과채권</div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">
      <span>전체 거래선 채권 현황 (${d.stores.length}개) <span style="font-size:12px;color:#A32D2D;font-weight:400;margin-left:6px">담보초과 ${exCnt}개</span></span>
      <button class="toggle-btn" id="${toggleId}" onclick="toggleExcess('${key}')">담보초과만 보기</button>
    </div>
    <div class="filter-bar">
      <input id="${searchId}" type="text" placeholder="매장명 검색..."/>
      <select id="${riskId}"><option value="">전체 위험도</option><option>위기</option><option>경계</option><option>주의</option><option>적정</option><option>관리</option></select>
      <select id="${spFilterId}"><option value="">전체 영업사원</option></select>
    </div>
    <div class="table-wrap"><table>
      <thead><tr>
        <th style="width:160px">매장명</th><th style="width:60px">담당</th>
        <th style="width:90px" class="nr">담보</th><th style="width:100px" class="nr">채권잔액</th>
        <th style="width:100px" class="nr">초과금액</th><th style="width:70px" class="nr">담보비율</th>
        <th style="width:65px;text-align:center">단계</th>
      </tr></thead>
      <tbody id="${tblId}"></tbody>
      <tfoot><tr style="background:#f0f0eb;font-weight:600;font-size:13px;border-top:2px solid #d3d1c7">
        <td colspan="2">합계 (<span id="${tblId}-cnt">0</span>개)</td>
        <td class="nr" id="${tblId}-sum-col"></td>
        <td class="nr" id="${tblId}-sum-rcv"></td>
        <td class="nr red" id="${tblId}-sum-exc"></td>
        <td class="nr"></td><td></td>
      </tr></tfoot>
    </table></div>
    <div id="${subtotalId}" style="display:none;margin-top:10px;padding-top:10px;border-top:1px solid #d3d1c7;font-size:13px"></div>
  </div>`;
  document.getElementById('excess-kpi-'+key).addEventListener('click',()=>toggleExcess(key,true));
  const topStores=d.stores.filter(x=>x.excess>0).sort((a,b)=>b.excess-a.excess).slice(0,10);
  if(chartRegistry[chartId]) chartRegistry[chartId].destroy();
  if(topStores.length>0){
    chartRegistry[chartId]=new Chart(document.getElementById(chartId),{
      type:'bar',
      data:{labels:topStores.map(s=>s.name.length>10?s.name.slice(0,10)+'…':s.name),
        datasets:[{data:topStores.map(s=>Math.round(s.excess/1e6)),backgroundColor:topStores.map(s=>riskColors[s.risk]||'#378ADD'),borderRadius:4,borderSkipped:false}]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'₩'+Math.round(c.raw)+'백만'}}},
        scales:{x:{ticks:{callback:v=>v+'M',font:{size:11}},grid:{color:'rgba(0,0,0,0.06)'}},y:{ticks:{font:{size:11}}}}}
    });
  }
  const spEl=document.getElementById(spId);
  const sp=d.by_salesperson;
  const maxR=Math.max(...Object.values(sp).map(x=>x.receivable),1);
  Object.entries(sp).sort((a,b)=>b[1].receivable-a[1].receivable).forEach(([name,dd])=>{
    const pct=Math.round(dd.receivable/maxR*100);
    const color=spColors[name]||'#378ADD';
    const row=document.createElement('div');
    row.className='sp-row';
    row.innerHTML=`<span class="sp-name">${name}</span><div class="sp-bg"><div class="sp-fill" style="width:${pct}%;background:${color}"></div></div><span class="sp-val">${fmt(dd.receivable)}</span><span class="sp-exc">${dd.excess>0?'+'+fmt(dd.excess):'-'}</span>`;
    spEl.appendChild(row);
  });
  const spSel=document.getElementById(spFilterId);
  Object.keys(sp).forEach(name=>{const o=document.createElement('option');o.value=name;o.textContent=name;spSel.appendChild(o);});
  document.getElementById(searchId).addEventListener('input',()=>renderTable(cat,dept));
  document.getElementById(riskId).addEventListener('change',()=>renderTable(cat,dept));
  document.getElementById(spFilterId).addEventListener('change',()=>renderTable(cat,dept));
  renderTable(cat,dept);
}

function togglePillExpand(key,risk){
  const expandEl=document.getElementById('expand-'+key);
  allRisks.forEach(r=>{const p=document.getElementById('pill-'+key+'-'+r);if(p)p.classList.remove('selected');});
  if(expandedRisk[key]===risk){expandedRisk[key]=null;expandEl.classList.remove('show');expandEl.innerHTML='';return;}
  expandedRisk[key]=risk;
  document.getElementById('pill-'+key+'-'+risk).classList.add('selected');
  const parts=key.split('-');const cat=parts[0],dept=parts.slice(1).join('-');
  const d=DATA[cat][dept];
  const stores=d.stores.filter(s=>s.risk===risk).sort((a,b)=>a.name.localeCompare(b.name,'ko'));
  if(stores.length===0){
    expandEl.innerHTML=`<div class="pill-expand-title">${risk} 단계 매장 (0개)</div><div style="color:#b4b2a9;font-size:13px">해당 단계 매장이 없습니다.</div>`;
  } else {
    expandEl.innerHTML=`<div class="pill-expand-title">${risk} 단계 매장 (${stores.length}개)</div>`+stores.map(s=>`<div class="pill-store-row"><div><span class="pill-store-name">${s.name}</span> <span class="pill-store-meta">· ${s.salesperson}</span></div><div class="pill-store-amt">${fmt(s.receivable)}${s.collateral>0?' / 담보비율 '+Math.round(s.ratio*100)+'%':''}</div></div>`).join('');
  }
  expandEl.classList.add('show');
}

function toggleExcess(key,forceOn){
  excessOnly[key]=forceOn?true:!excessOnly[key];
  const btn=document.getElementById('toggle-'+key);
  if(excessOnly[key]){btn.classList.add('active');btn.textContent='전체 보기';}
  else{btn.classList.remove('active');btn.textContent='담보초과만 보기';}
  const parts=key.split('-');renderTable(parts[0],parts.slice(1).join('-'));
}

function renderTable(cat,dept){
  const key=pageKey(cat,dept);
  const d=DATA[cat][dept];
  const q=document.getElementById('srch-'+key).value.toLowerCase();
  const r=document.getElementById('risk-'+key).value;
  const p=document.getElementById('spf-'+key).value;
  let rows=d.stores.filter(s=>(!q||s.name.toLowerCase().includes(q))&&(!r||s.risk===r)&&(!p||s.salesperson===p));
  if(excessOnly[key]) rows=rows.filter(s=>s.excess>0).sort((a,b)=>b.excess-a.excess);
  const tbody=document.getElementById('tbl-'+key);
  tbody.innerHTML='';
  const totalC=rows.reduce((s,x)=>s+x.collateral,0);
  const totalR=rows.reduce((s,x)=>s+x.receivable,0);
  const totalE=rows.reduce((s,x)=>s+(x.excess>0?x.excess:0),0);
  const cntEl=document.getElementById('tbl-'+key+'-cnt');
  if(cntEl){
    cntEl.textContent=rows.length;
    document.getElementById('tbl-'+key+'-sum-col').textContent=fmt(totalC);
    document.getElementById('tbl-'+key+'-sum-rcv').textContent=fmt(totalR);
    document.getElementById('tbl-'+key+'-sum-exc').textContent=totalE>0?'+'+fmt(totalE):fmt(totalE);
  }
  rows.forEach(s=>{
    const exStyle=s.excess>0?'class="red"':'class="muted"';
    const tr=document.createElement('tr');
    tr.innerHTML=`<td title="${s.name}">${s.name}</td><td>${s.salesperson}</td><td class="nr">${fmt(s.collateral)}</td><td class="nr">${fmt(s.receivable)}</td><td class="nr" ${exStyle}>${s.excess>0?'+'+fmt(s.excess):fmt(s.excess)}</td><td class="nr">${s.collateral>0?Math.round(s.ratio*100)+'%':'—'}</td><td style="text-align:center"><span class="badge b${s.risk}">${s.risk}</span></td>`;
    tbody.appendChild(tr);
  });
  const subtotalEl=document.getElementById('subtotal-'+key);
  if(p||r||q||excessOnly[key]){
    const labelParts=[];
    if(p)labelParts.push(p);if(r)labelParts.push(r);if(q)labelParts.push('"'+q+'"');if(excessOnly[key])labelParts.push('담보초과');
    subtotalEl.innerHTML=`<strong>${labelParts.join(' · ')} 소계</strong> (${rows.length}개) — 담보 ${fmt(totalC)} · 채권잔액 ${fmt(totalR)} · 초과채권 <span class="red">${fmt(totalE)}</span>`;
    subtotalEl.style.display='block';
  } else {subtotalEl.style.display='none';}
}

function switchTab(cat,dept,el){
  el.parentElement.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('cat-'+cat).querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+pageKey(cat,dept)).classList.add('active');
  const key=pageKey(cat,dept);
  if(!builtPages[key]){buildPage(cat,dept);builtPages[key]=true;}
}

function switchCat(cat,el){
  document.querySelectorAll('.sidebar-item').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.cat-page').forEach(p=>p.classList.remove('active'));
  document.getElementById('cat-'+cat).classList.add('active');
}

buildAiDash();
buildPage('의류','영업1팀');builtPages['의류-영업1팀']=true;
buildPage('용품','영업1팀');builtPages['용품-영업1팀']=true;
</script>
</body>
</html>
